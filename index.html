<!DOCTYPE html>
<html>
<head>
  <title>Movement with Boundaries</title>
  <style>
    body {
      text-align: center;
      font-family: Arial;
    }

    canvas {
      border: 2px solid black;
      background: #f0f0f0;
      margin-top: 20px;
    }
  </style>
</head>
<body>

<h2>Use Arrow Keys</h2>
<canvas id="game" width="500" height="400"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

// Player
let player = {
  x: 60,
  y: 60,
  radius: 10,
  speed: 3
};

// Walls (boundaries)
let walls = [
  {x: 0, y: 0, width: 500, height: 10},   // top
  {x: 0, y: 390, width: 500, height: 10}, // bottom
  {x: 0, y: 0, width: 10, height: 400},   // left
  {x: 490, y: 0, width: 10, height: 400}  // right
];

// Obstacle
let obstacle = {x: 200, y: 150, width: 120, height: 60};
let obstacle = {x: 50, y: 200,  width: 100, height: 20};

// Keys
let keys = {};

document.addEventListener("keydown", e => keys[e.key] = true);
document.addEventListener("keyup", e => keys[e.key] = false);

// Collision check (circle vs rectangle)
function collidesCircleRect(cx, cy, radius, rect) {
  let closestX = Math.max(rect.x, Math.min(cx, rect.x + rect.width));
  let closestY = Math.max(rect.y, Math.min(cy, rect.y + rect.height));

  let dx = cx - closestX;
  let dy = cy - closestY;

  return (dx * dx + dy * dy) < (radius * radius);
}

function canMove(newX, newY) {
  // Check walls
  for (let wall of walls) {
    if (collidesCircleRect(newX, newY, player.radius, wall)) {
      return false;
    }
  }

  // Check obstacle
  if (collidesCircleRect(newX, newY, player.radius, obstacle)) {
    return false;
  }

  return true;
}

function update() {
  let newX = player.x;
  let newY = player.y;

  if (keys["ArrowUp"]) newY -= player.speed;
  if (keys["ArrowDown"]) newY += player.speed;
  if (keys["ArrowLeft"]) newX -= player.speed;
  if (keys["ArrowRight"]) newX += player.speed;

  if (canMove(newX, newY)) {
    player.x = newX;
    player.y = newY;
  }
}

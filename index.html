<!DOCTYPE html>
<html>
<head>
  <title>My Map Game</title>
  <style>
    body { margin: 0; overflow: hidden; }
    canvas { background: #111; display: block; }
  </style>
</head>
<body>

<canvas id="game"></canvas>

<script>
// 👇 ALL your game code goes here

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// Player
const player = {
  x: 500,
  y: 500,
  radius: 20,
  speed: 4
};

// Obstacles
const obstacles = [
  { x: 300, y: 300, w: 200, h: 50 },
  { x: 600, y: 500, w: 150, h: 150 }
];

// Input
const keys = {};
window.addEventListener("keydown", e => keys[e.key] = true);
window.addEventListener("keyup", e => keys[e.key] = false);

// ✅ COLLISION FUNCTIONS
function isColliding(circle, rect) {
  const closestX = Math.max(rect.x, Math.min(circle.x, rect.x + rect.w));
  const closestY = Math.max(rect.y, Math.min(circle.y, rect.y + rect.h));

  const dx = circle.x - closestX;
  const dy = circle.y - closestY;

  return (dx * dx + dy * dy) < (circle.radius * circle.radius);
}

function canMove(newX, newY) {
  for (let o of obstacles) {
    const test = { x: newX, y: newY, radius: player.radius };
    if (isColliding(test, o)) return false;
  }
  return true;
}

// Movement
function update() {
  let dx = 0;
  let dy = 0;

  if (keys["ArrowUp"]) dy -= player.speed;
  if (keys["ArrowDown"]) dy += player.speed;
  if (keys["ArrowLeft"]) dx -= player.speed;
  if (keys["ArrowRight"]) dx += player.speed;

  let newX = player.x + dx;
  let newY = player.y + dy;

  if (canMove(newX, newY)) {
    player.x = newX;
    player.y = newY;
  }
}

// Draw
function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Obstacles
  ctx.fillStyle = "red";
  obstacles.forEach(o => {
    ctx.fillRect(o.x, o.y, o.w, o.h);
  });

  // Player
  ctx.beginPath();
  ctx.arc(player.x, player.y, player.radius, 0, Math.PI * 2);
  ctx.fillStyle = "cyan";
  ctx.fill();
}

// Loop
function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

loop();

</script>
</body>
</html>

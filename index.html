<!DOCTYPE html>
<html>
<head>
  <title>Simple Map</title>
  <style>
    body { margin: 0; overflow: hidden; }
    canvas { background: #111; display: block; }
  </style>
</head>
<body>
<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// Player
const player = {
  x: 500,
  y: 500,
  radius: 20,
  speed: 4
};

// Map size
const map = {
  width: 2000,
  height: 2000
};

// Obstacles
const obstacles = [
  { x: 300, y: 300, w: 200, h: 50 },
  { x: 800, y: 600, w: 100, h: 300 },
  { x: 1200, y: 1000, w: 250, h: 80 }
];

// Input
const keys = {};
window.addEventListener("keydown", e => keys[e.key] = true);
window.addEventListener("keyup", e => keys[e.key] = false);

// Movement
function update() {
  if (keys["ArrowUp"]) player.y -= player.speed;
  if (keys["ArrowDown"]) player.y += player.speed;
  if (keys["ArrowLeft"]) player.x -= player.speed;
  if (keys["ArrowRight"]) player.x += player.speed;

  // Boundaries (keep player inside map)
  player.x = Math.max(player.radius, Math.min(map.width - player.radius, player.x));
  player.y = Math.max(player.radius, Math.min(map.height - player.radius, player.y));
}

// Draw everything
function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Camera offset (center player)
  const camX = player.x - canvas.width / 2;
  const camY = player.y - canvas.height / 2;

  ctx.save();
  ctx.translate(-camX, -camY);

  // Draw map border
  ctx.strokeStyle = "white";
  ctx.strokeRect(0, 0, map.width, map.height);

  // Draw obstacles
  ctx.fillStyle = "red";
  obstacles.forEach(o => {
    ctx.fillRect(o.x, o.y, o.w, o.h);
  });

  // Draw player
  ctx.beginPath();
  ctx.arc(player.x, player.y, player.radius, 0, Math.PI * 2);
  ctx.fillStyle = "cyan";
  ctx.fill();

  ctx.restore();
}

// Game loop
function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

loop();
</script>
</body>
</html>
